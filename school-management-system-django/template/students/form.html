{% extends "base.html" %}
{% block title %}{{ title }} – SMS{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>{{ title }}</h2>
  <a href="{% url 'student-list' %}" class="btn btn-outline-secondary">← Back</a>
</div>

<div class="card border-0 shadow-sm" style="max-width:700px">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-500">Student ID *</label>
          <input type="text" name="student_id" class="form-control"
                 value="{{ form_data.student_id|default:'' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Department *</label>
          <select name="department" class="form-select" required>
            <option value="">-- Select Department --</option>
            {% for dept in departments %}
              <option value="{{ dept.pk }}">{{ dept.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">First Name *</label>
          <input type="text" name="first_name" class="form-control"
                 value="{{ form_data.first_name|default:'' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Last Name *</label>
          <input type="text" name="last_name" class="form-control"
                 value="{{ form_data.last_name|default:'' }}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Email *</label>
          <input type="email" name="email" class="form-control"
                 value="{{ form_data.email|default:'' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ form_data.phone|default:'' }}">
        </div>

        <div class="col-md-6">
          <label class="form-label">Gender *</label>
          <select name="gender" class="form-select" required>
            <option value="">-- Select --</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="O">Other</option>
          </select>
        </div>
      </div>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4">Save Student</button>
        <a href="{% url 'student-list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
