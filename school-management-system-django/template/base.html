<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SMS{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <span class="nav-link">{{ user.username }}</span>
      </li>
      <li class="nav-item">
        <form method="post" action="{% url 'logout' %}" class="d-inline">
          {% csrf_token %}
          <button class="nav-link btn btn-link text-danger" type="submit">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </form>
      </li>
    </ul>
  </nav>

  <!-- Sidebar -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="{% url 'dashboard' %}" class="brand-link">
      <span class="brand-text font-weight-light ml-3">
        <i class="fas fa-graduation-cap mr-2"></i> SMS
      </span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column"
            data-widget="treeview" role="menu">

          <li class="nav-item">
            <a href="{% url 'dashboard' %}"
               class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
              <i class="nav-icon fas fa-tachometer-alt"></i>
              <p>Dashboard</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="{% url 'student-list' %}"
               class="nav-link {% if 'students' in request.path %}active{% endif %}">
              <i class="nav-icon fas fa-user-graduate"></i>
              <p>Students</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="{% url 'student-create' %}" class="nav-link">
              <i class="nav-icon fas fa-user-plus"></i>
              <p>Add Student</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="/admin/" class="nav-link">
              <i class="nav-icon fas fa-cogs"></i>
              <p>Admin Panel</p>
            </a>
          </li>

        </ul>
      </nav>
    </div>
  </aside>

  <!-- Content wrapper -->
  <div class="content-wrapper">
    <div class="content-header">
      <div class="container-fluid">
        {% for msg in messages %}
          <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
            {{ msg }}
            <button type="button" class="close" data-dismiss="alert">
              <span>&times;</span>
            </button>
          </div>
        {% endfor %}
      </div>
    </div>
    <div class="content">
      <div class="container-fluid">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="main-footer">
    <strong>Student Management System</strong> &copy; 2026
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
