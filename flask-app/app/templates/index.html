{% extends "base.html" %}
{% block content %}
<div class="header-actions">
    <a href="{{ url_for('main.create') }}" class="btn btn-primary">Add Student</a>
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th class="actions-col">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.email }}</td>
                <td>{{ student.course }}</td>
                <td class="actions-cell">
                    <a href="{{ url_for('main.edit', id=student.id) }}" class="btn btn-sm btn-edit">Edit</a>
                    <form action="{{ url_for('main.delete', id=student.id) }}" method="POST" class="delete-form">
                        <button type="submit" class="btn btn-sm btn-delete">Delete</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" class="text-center">No students found. Add one!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
